listen              1935;
max_connections     1000;
daemon              off;
srs_log_tank        console;

http_api {
    enabled         on;
    listen          1985;
    crossdomain   on;
}
http_server {
    enabled         on;
    listen          8082;
}
rtc_server {
    enabled on;
    listen 8000; # UDP 端口
    candidate 10.5.147.107;
}

vhost __defaultVhost__ {
 rtc {
        enabled     on;
        rtmp_to_rtc on;
        nack on; 
        twcc on;
    }

    play {
        gop_cache       off;
        queue_length    0.1;
        mw_latency      100;
    }

    http_hooks {
        enabled         on; 

        on_publish      http://10.5.147.107:8081/api/v1/srs/on_publish;
        on_unpublish  http://10.5.147.107:8081/api/v1/srs/on_unpublish;
    }
}